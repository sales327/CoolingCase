<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EisKalt | Cooling case concept</title>
  <meta
    name="description"
    content="EisKalt is a Swiss-developed cooling case concept for pilots, drone operators, field work, and gaming in extreme heat."
  >
  <meta name="theme-color" content="#eceef2">
  <style>
    :root {
      --bg: #eceef2;
      --bg-top: #eef3f9;
      --surface: #f7f7f8;
      --surface-strong: #ffffff;
      --surface-alt: #edf0f4;
      --text: #152133;
      --muted: #5d6776;
      --muted-strong: #465163;
      --line: #d7dce3;
      --line-strong: #c3cad4;
      --dark: #121c2d;
      --accent: #e67b3d;
      --accent-deep: #c84e16;
      --accent-soft: rgba(230, 123, 61, 0.18);
      --blue-soft: #e8f1ff;
      --shadow-lg: 0 24px 60px rgba(22, 33, 51, 0.12);
      --shadow-md: 0 14px 30px rgba(22, 33, 51, 0.08);
      --shadow-sm: 0 8px 18px rgba(22, 33, 51, 0.05);
      --radius-xl: 14px;
      --radius-lg: 10px;
      --radius-md: 8px;
      --radius-sm: 6px;
      --max-width: 1360px;
      --focus: 0 0 0 4px rgba(230, 123, 61, 0.18);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--text);
      background:
        radial-gradient(circle at 25% 8%, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.18) 14%, transparent 15%),
        linear-gradient(180deg, #eef2f7 0%, #f4f2f1 50%, #ececed 50.2%, #ececed 100%);
      font-family: "Bahnschrift", "Aptos", "Segoe UI Variable Text", "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
    }

    .page-shell {
      min-height: 100vh;
    }

    .container {
      width: min(calc(100% - 24px), var(--max-width));
      margin-inline: auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(238, 242, 247, 0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(215, 220, 227, 0.75);
    }

    .topbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 2rem;
      height: 2rem;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius-sm);
      background: linear-gradient(145deg, var(--accent), var(--accent-deep));
      color: #fff7f1;
      box-shadow: var(--shadow-sm);
      font-size: 0.8rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .jump-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      padding: 0.72rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      font-size: 0.92rem;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.28rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow-sm);
    }

    .lang-button {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      min-height: 2.3rem;
      padding: 0.5rem 0.7rem;
      border-radius: calc(var(--radius-sm) - 2px);
      color: var(--muted-strong);
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .lang-button.is-active {
      background: var(--dark);
      color: #f5f7fb;
    }

    .flag {
      width: 1.1rem;
      height: 0.84rem;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      flex: none;
    }

    .flag-en {
      background:
        linear-gradient(0deg, #244aa5 0 100%);
    }

    .flag-en::before,
    .flag-en::after {
      content: "";
      position: absolute;
      background: #fff;
    }

    .flag-en::before {
      inset: 38% 0;
    }

    .flag-en::after {
      inset: 0 43%;
    }

    .flag-ch {
      background: #e63b32;
    }

    .flag-ch::before,
    .flag-ch::after {
      content: "";
      position: absolute;
      background: #fff;
    }

    .flag-ch::before {
      width: 58%;
      height: 18%;
      left: 21%;
      top: 41%;
    }

    .flag-ch::after {
      width: 18%;
      height: 58%;
      left: 41%;
      top: 21%;
    }

    .hero {
      position: relative;
      min-height: 620px;
      overflow: hidden;
      background:
        radial-gradient(circle at 41% 4%, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.14) 10%, transparent 15%),
        linear-gradient(180deg, #edf2f8 0%, #f4f2f0 75%);
      border-bottom-left-radius: var(--radius-md);
      border-bottom-right-radius: var(--radius-md);
    }

    .hero::before {
      content: "";
      position: absolute;
      left: 330px;
      right: 305px;
      bottom: 120px;
      height: 180px;
      background: radial-gradient(ellipse at center, rgba(172, 142, 123, 0.42) 0%, rgba(172, 142, 123, 0.3) 18%, rgba(172, 142, 123, 0.14) 36%, transparent 58%);
      filter: blur(12px);
      opacity: 0.82;
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 122px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      opacity: 0.42;
    }

    .hero-inner {
      padding: 34px 34px 0;
    }

    .hero-topline {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      letter-spacing: 0.2em;
      font-weight: 800;
      text-transform: uppercase;
      color: #233147;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr 0.56fr;
      gap: 10px;
      margin-top: 28px;
      align-items: start;
    }

    .swiss-box {
      width: 27px;
      height: 27px;
      border-radius: 3px;
      background: #e63d31;
      position: relative;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      flex: none;
    }

    .swiss-box::before,
    .swiss-box::after {
      content: "";
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }

    .swiss-box::before {
      width: 15px;
      height: 4px;
      left: 6px;
      top: 11.5px;
    }

    .swiss-box::after {
      width: 4px;
      height: 15px;
      left: 11.5px;
      top: 6px;
    }

    .hero-copy {
      padding-top: 2px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: #667083;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .hero-copy h1 {
      margin: 24px 0 18px;
      font-size: 68px;
      line-height: 0.94;
      letter-spacing: -0.055em;
      font-weight: 800;
      color: #162238;
    }

    .hero-desc {
      margin: 0 0 22px;
      max-width: 600px;
      font-size: 18px;
      line-height: 1.55;
      color: #495262;
      font-weight: 500;
    }

    .benefits {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0 28px;
    }

    .mini-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow-sm);
      color: #394252;
      font-size: 14px;
      font-weight: 700;
    }

    .mini-pill::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--accent), var(--accent-deep));
      box-shadow: 0 0 0 4px rgba(230, 123, 61, 0.12);
      flex: none;
    }
  </style>
</head>
<body>
  <div class="page-shell">
  </div>
  <script>
  </script>
</body>
</html>
